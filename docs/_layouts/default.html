<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="icon" type="image/png" href="{{ '/assets/favicon-96.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
    {% seo %}
    
    <style>
      :root {
        /* DARK THEME (The Matrix) */
        --term-bg: #050505;
        --term-fg: #00ff00;
        --term-dim: #008800;
        --term-accent: #00ffff;
        --term-scanline: rgba(0, 0, 0, 0.25);
        --term-font: 'Courier New', Courier, monospace;
      }

      [data-theme="light"] {
        /* LIGHT THEME (The Architect / Lab) */
        --term-bg: #f5f5f5;      /* Clean off-white */
        --term-fg: #1a1a1a;      /* Deep charcoal */
        --term-dim: #999999;     /* Grayed out text */
        --term-accent: #0055ff;  /* Sharp blue for links */
        --term-scanline: rgba(0, 0, 0, 0.03); /* Faint scanlines */
      }
      
      body, html {
        background-color: var(--term-bg) !important;
        color: var(--term-fg) !important;
        font-family: var(--term-font) !important;
        transition: background-color 0.2s, color 0.2s;
        margin: 0;
      }
      
      h1, h2, h3, .sidebar-eyebrow, .sidebar-title {
        color: var(--term-fg) !important;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      a {
        color: var(--term-accent) !important;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      
      a:hover {
        background-color: var(--term-fg);
        color: var(--term-bg) !important;
        text-decoration: none;
      }

      /* Borders & Structure */
      .site-header {
        border-bottom: 2px solid var(--term-fg) !important;
        background: transparent !important;
      }
      
      .site-sidebar {
        border-right: 1px solid var(--term-dim) !important;
      }
      
      .sidebar-card {
        border: 1px solid var(--term-fg);
        padding: 1rem;
        margin-bottom: 1rem;
      }

      /* Navigation Styles */
      .sidebar-nav__link {
        display: block;
        padding: 0.4rem 0;
        border-bottom: 1px dotted var(--term-dim);
      }
      
      .sidebar-nav__link::before { content: "> "; }
      
      .sidebar-nav__link.is-active {
        font-weight: bold;
        background: var(--term-fg);
        color: var(--term-bg) !important;
      }

      /* Buttons */
      .button {
        display: inline-block;
        padding: 0.6rem 1.2rem;
        border: 2px solid var(--term-fg) !important;
        background: var(--term-bg) !important;
        color: var(--term-fg) !important;
        text-transform: uppercase;
        font-weight: 900;
        cursor: pointer;
        text-decoration: none;
      }
      
      .button:hover {
        background: var(--term-fg) !important;
        color: var(--term-bg) !important;
      }

      .button--ghost {
        border: 1px solid var(--term-dim) !important;
        color: var(--term-dim) !important;
      }

      /* Theme Switcher specific */
      #theme-toggle {
        margin-left: 1rem;
        font-size: 11px;
      }

      /* Scanline & Blinking Cursor */
      .site-bg {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: linear-gradient(var(--term-scanline) 50%, transparent 50%);
        background-size: 100% 4px;
        z-index: 9999;
        pointer-events: none;
      }

      .blink { animation: blinker 0.8s step-start infinite; }
      @keyframes blinker { 50% { opacity: 0; } }
    </style>
  </head>
  <body>
    <div class="site-bg"></div>
    
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand__mark">MNRP://SYSTEM_DOCS</span>
          <span class="blink">|</span>
        </a>
        <div class="site-header__links">
          <a href="{{ site.releases_url }}">Releases</a>
          <a href="{{ site.github_repo }}">GitHub</a>
          <button id="theme-toggle" class="button">SWITCH_MODE</button>
        </div>
      </div>
    </header>

    <div class="site-shell">
      <aside class="site-sidebar">
        <div class="sidebar-card">
          <div class="sidebar-eyebrow">NODE_INFO</div>
          <div class="sidebar-title">{{ site.title }}</div>
          <p class="sidebar-copy">{{ site.tagline }}</p>
        </div>

        <nav class="sidebar-nav">
          {% for item in site.nav %}
            <a class="sidebar-nav__link{% if page.url == item.url %} is-active{% endif %}" href="{{ item.url | relative_url }}">
              {{ item.title }}
            </a>
          {% endfor %}
        </nav>
      </aside>

      <main class="site-main">
        <div class="page-frame">
          <div class="page-hero">
            <h1>{{ page.title }}</h1>
            <div class="page-actions">
              <a class="button" href="{{ site.releases_url }}">EXECUTE_DOWNLOAD</a>
              <a class="button button--ghost" href="{{ site.github_repo }}">SOURCE_CODE</a>
            </div>
          </div>

          <article class="page-content">
            {{ content }}
          </article>
        </div>
      </main>
    </div>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <span>&copy; {{ site.title }} // UNLOCKING_POTENTIAL</span>
        <button id="theme-toggle-footer" style="background:none; border:none; color:var(--term-dim); cursor:pointer; font-family:inherit;">[TOGGLE_UI]</button>
      </div>
    </footer>

    <script>
      const toggleBtns = [document.getElementById("theme-toggle"), document.getElementById("theme-toggle-footer")];
      const htmlEl = document.documentElement;

      const setTheme = (theme) => {
        if (theme === "light") {
          htmlEl.setAttribute("data-theme", "light");
          localStorage.setItem("theme", "light");
        } else {
          htmlEl.removeAttribute("data-theme");
          localStorage.setItem("theme", "dark");
        }
      };

      // Init
      const saved = localStorage.getItem("theme");
      if (saved) setTheme(saved);

      toggleBtns.forEach(btn => {
        if(!btn) return;
        btn.addEventListener("click", () => {
          const isLight = htmlEl.getAttribute("data-theme") === "light";
          setTheme(isLight ? "dark" : "light");
        });
      });
    </script>
  </body>
</html>
